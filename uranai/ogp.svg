<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5f0ff"/>
      <stop offset="50%"  stop-color="#ede8ff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spot1" cx="30%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="80%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#fbcfe8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbcfe8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spot1)"/>
  <rect width="1200" height="630" fill="url(#spot2)"/>

  <!-- 上部グラデーションライン -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#bar)"/>

  <!-- 装飾：小さな星 -->
  <text x="80"  y="120" font-size="18" fill="#a855f7" opacity="0.3">✦</text>
  <text x="200" y="60"  font-size="12" fill="#a855f7" opacity="0.2">✧</text>
  <text x="1050" y="100" font-size="20" fill="#db2777" opacity="0.25">✦</text>
  <text x="1120" y="200" font-size="10" fill="#a855f7" opacity="0.2">⋆</text>
  <text x="150"  y="540" font-size="14" fill="#a855f7" opacity="0.2">✧</text>
  <text x="1080" y="520" font-size="16" fill="#db2777" opacity="0.2">✦</text>
  <text x="600"  y="80"  font-size="10" fill="#a855f7" opacity="0.15">⋆</text>

  <!-- 中央パネル -->
  <rect x="100" y="100" width="1000" height="430" rx="24" fill="white" fill-opacity="0.75"/>
  <rect x="100" y="100" width="1000" height="430" rx="24" fill="none" stroke="#c4b5fd" stroke-width="1.5"/>

  <!-- サブテキスト -->
  <text x="600" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#9333ea" opacity="0.6" letter-spacing="8">PSYCHOLOGY × ASTROLOGY</text>

  <!-- 区切り線 -->
  <line x1="480" y1="195" x2="540" y2="195" stroke="#c4b5fd" stroke-width="1"/>
  <text x="600" y="200" text-anchor="middle" font-size="12" fill="#a855f7" opacity="0.5">✦</text>
  <line x1="660" y1="195" x2="720" y2="195" stroke="#c4b5fd" stroke-width="1"/>

  <!-- メインタイトル -->
  <text x="600" y="275" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="bold" fill="url(#title)" filter="url(#glow)">星座 × ビッグファイブ</text>
  <text x="600" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#2e1065">相性診断</text>

  <!-- 説明文 -->
  <text x="600" y="415" text-anchor="middle" font-family="'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif" font-size="20" fill="#6b21a8" opacity="0.65">占いじゃなく、心理学で分析する相性診断</text>

  <!-- 星座シンボル（左） -->
  <text x="175" y="310" text-anchor="middle" font-size="64" fill="#7c3aed" opacity="0.18">♈</text>
  <text x="175" y="390" text-anchor="middle" font-size="48" fill="#a855f7" opacity="0.14">♎</text>

  <!-- 星座シンボル（右） -->
  <text x="1025" y="310" text-anchor="middle" font-size="64" fill="#db2777" opacity="0.18">♏</text>
  <text x="1025" y="390" text-anchor="middle" font-size="48" fill="#a855f7" opacity="0.14">♊</text>

  <!-- フッター -->
  <text x="600" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#9333ea" opacity="0.4" letter-spacing="4">ASOBI LAB</text>
</svg>
