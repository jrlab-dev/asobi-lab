<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ビッグファイブカードゲーム – カード裏面（両面印刷用）</title>
<style>
/* ================================================================
   RESET & PRINT
================================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
@page { size: 210mm 297mm; margin: 0; }
body { font-family: 'Meiryo', 'MS Gothic', 'Yu Gothic', sans-serif; background: #555; }
@media print {
  body { background: white; }
  .page-label { display: none; }
  .page { margin: 0; page-break-after: always; break-after: page; }
}

/* ================================================================
   使い方ガイド（画面表示のみ）
================================================================ */
.guide {
  width: 210mm;
  margin: 0 auto 8px;
  background: #1A237E;
  color: white;
  padding: 6px 10px;
  font-size: 8px;
  line-height: 1.7;
  border-radius: 0 0 4px 4px;
}
.guide strong { color: #FFD740; }
@media print { .guide { display: none; } }

/* ================================================================
   PAGE LAYOUT (A4, 3×3) ── 表面と完全に同じグリッド
================================================================ */
.page-label {
  width: 210mm; margin: 0 auto;
  background: #333; color: white;
  text-align: center; font-size: 9px; padding: 3px;
}
.page {
  width: 210mm; height: 297mm;
  background: white;
  display: grid;
  /*
    ★ポイント: 裏面は左右ミラー配置
    表面を裏返した時に列が逆になるので、direction:rtl で右端から並べる
  */
  grid-template-columns: repeat(3, 63mm);
  grid-template-rows: repeat(3, 88mm);
  padding: 16.5mm 10.5mm;
  gap: 0;
  direction: rtl;   /* ← 左右ミラーの核心 */
  margin: 0 auto 6px;
  page-break-after: always;
  break-after: page;
}

/* ================================================================
   CARD BACK
   ★表面との差：padding: 0 → フルブリード（表より大きく見える）
   ★四隅セーフゾーン：inner-frameが3mm内側からスタート
================================================================ */
.card-back {
  width: 63mm; height: 88mm;
  position: relative;
  overflow: hidden;
  direction: ltr;  /* 子要素はltrに戻す */
  /* フルブリードなので外側に余白なし → 表のパディング3pxより広い */
  background:
    /* 放射光線エフェクト */
    repeating-conic-gradient(
      rgba(255,255,255,0.06) 0deg 12deg,
      transparent 12deg 24deg
    ),
    /* メイン背景グラデーション */
    radial-gradient(ellipse at 50% 40%,
      #1A237E 0%,
      #0D1257 40%,
      #000428 100%
    );
}

/* 四隅のセーフゾーン目印（印刷時は見えない薄い角マーク）*/
.card-back::before {
  content: '';
  position: absolute;
  inset: 3mm;   /* ← カット線から3mm内側がデザイン安全ゾーン */
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 2mm;
  pointer-events: none;
  z-index: 10;
}

/* ================================================================
   金色グロー外枠ライン（内側に3mmあけて配置）
================================================================ */
.back-frame {
  position: absolute;
  inset: 3mm;
  border-radius: 2mm;
  padding: 2.5px;
  background: linear-gradient(145deg,
    #FFE066 0%,
    #FFC200 15%,
    #FFE566 28%,
    #D4A800 40%,
    #FFF0A0 50%,
    #B8880A 62%,
    #FFD700 75%,
    #C8A000 88%,
    #FFE066 100%
  );
  box-shadow:
    0 0 8px rgba(255,215,0,0.7),
    0 0 16px rgba(255,180,0,0.4),
    inset 0 0 6px rgba(255,240,100,0.3);
}

/* フレーム内側の背景 */
.back-inner {
  width: 100%;
  height: 100%;
  border-radius: 1.5mm;
  background:
    repeating-conic-gradient(
      rgba(255,255,255,0.05) 0deg 15deg,
      transparent 15deg 30deg
    ),
    radial-gradient(ellipse at 50% 38%,
      #283593 0%,
      #1A237E 35%,
      #0D1257 70%,
      #000428 100%
    );
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2mm;
  overflow: hidden;
  position: relative;
}

/* 輝き装飾（中心発光） */
.back-inner::before {
  content: '';
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 35mm;
  height: 35mm;
  border-radius: 50%;
  background: radial-gradient(
    rgba(100,130,255,0.35) 0%,
    transparent 70%
  );
  pointer-events: none;
}

/* ================================================================
   ロゴエリア
================================================================ */
.back-logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1mm;
  position: relative;
  z-index: 2;
}

/* "BIG5" 大文字タイトル */
.back-title-big {
  font-size: 22pt;
  font-weight: 900;
  letter-spacing: 2px;
  color: transparent;
  background: linear-gradient(180deg,
    #FFFFFF 0%,
    #FFE566 30%,
    #FFD700 55%,
    #C8A000 80%,
    #FFE566 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 5px rgba(255,215,0,0.8))
          drop-shadow(0 2px 4px rgba(0,0,0,0.9));
  line-height: 1;
}

/* サブタイトル */
.back-title-sub {
  font-size: 6pt;
  font-weight: 900;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.75);
  text-shadow: 0 0 6px rgba(100,150,255,0.8);
}

/* ================================================================
   OCEAN シンボル装飾
================================================================ */
.ocean-symbols {
  display: flex;
  gap: 2.5mm;
  align-items: center;
  position: relative;
  z-index: 2;
}
.ocean-gem {
  width: 7mm; height: 7mm;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5.5pt;
  font-weight: 900;
  border: 1px solid rgba(255,255,255,0.4);
  box-shadow: 0 0 6px rgba(255,255,255,0.3);
}
.gem-O { background: radial-gradient(#66BB6A, #1B5E20); color: #E8F5E9; }
.gem-C { background: radial-gradient(#FF8A65, #BF360C); color: #FFF3E0; }
.gem-E { background: radial-gradient(#FFD54F, #E65100); color: #FFF8E1; }
.gem-A { background: radial-gradient(#F48FB1, #880E4F); color: #FCE4EC; }
.gem-N { background: radial-gradient(#80DEEA, #006064); color: #E0F7FA; }

/* ================================================================
   キャッチコピー
================================================================ */
.back-catchcopy {
  font-size: 4.5pt;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.6;
  position: relative;
  z-index: 2;
}

/* ================================================================
   底部ライン
================================================================ */
.back-bottom-line {
  position: absolute;
  bottom: 2.5mm;
  left: 0; right: 0;
  text-align: center;
  font-size: 3.5pt;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.5px;
  z-index: 2;
}

/* ================================================================
   CARD CELL WRAPPER + 切り取り印（表面と同じ位置）
================================================================ */
.card-cell {
  width: 63mm; height: 88mm;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  direction: ltr;
}

/* L字切り取り印（表面と完全に同じサイズ・位置） */
/* 表面と完全に同じ位置（2mm）・暗い背景なので白色 */
.cm {
  position: absolute;
  width: 2mm; height: 2mm;
  z-index: 100;
}
.cm-tl { top:0;    left:0;  border-top:    0.8px solid rgba(255,255,255,0.75); border-left:   0.8px solid rgba(255,255,255,0.75); }
.cm-tr { top:0;    right:0; border-top:    0.8px solid rgba(255,255,255,0.75); border-right:  0.8px solid rgba(255,255,255,0.75); }
.cm-bl { bottom:0; left:0;  border-bottom: 0.8px solid rgba(255,255,255,0.75); border-left:   0.8px solid rgba(255,255,255,0.75); }
.cm-br { bottom:0; right:0; border-bottom: 0.8px solid rgba(255,255,255,0.75); border-right:  0.8px solid rgba(255,255,255,0.75); }

/* ================================================================
   空白マス（使わないセル）
================================================================ */
.card-blank {
  width: 63mm; height: 88mm;
  direction: ltr;
}

</style>
</head>
<body>

<!-- 使い方ガイド（画面のみ表示） -->
<div class="guide">
  <strong>【両面印刷の手順】</strong><br>
  ① 表面（カード印刷用_全カード.html）を印刷する<br>
  ② 同じ用紙を裏返してセットし、このファイルを印刷する<br>
  ③ <strong>左右ミラー配置済み</strong>なので、表のカードと裏面が自動的に一致します<br>
  ④ <strong>裏面はフルブリード</strong>（表より約3mm広くデザイン）→ 多少ズレても白フチが出ません<br>
  ⑤ <strong>金枠は3mm内側</strong>から始まります → 切断後のズレを吸収する安全ゾーンです
</div>

<div id="output"></div>

<script>
// ============================================================
//  1枚の裏面カード HTML
// ============================================================
function makeBackCard() {
  return `<div class="card-cell">
  <div class="cm cm-tl"></div><div class="cm cm-tr"></div>
  <div class="cm cm-bl"></div><div class="cm cm-br"></div>
  <div class="card-back">
  <div class="back-frame">
    <div class="back-inner">

      <!-- ロゴ -->
      <div class="back-logo-wrap">
        <div class="back-title-big">BIG5</div>
        <div class="back-title-sub">カードゲーム</div>
      </div>

      <!-- OCEANシンボル -->
      <div class="ocean-symbols">
        <div class="ocean-gem gem-O">O</div>
        <div class="ocean-gem gem-C">C</div>
        <div class="ocean-gem gem-E">E</div>
        <div class="ocean-gem gem-A">A</div>
        <div class="ocean-gem gem-N">N</div>
      </div>

      <!-- キャッチコピー -->
      <div class="back-catchcopy">
        自分を知る力が<br>最強の武器になる
      </div>

      <!-- 底部 -->
      <div class="back-bottom-line">ビッグファイブカードゲーム ／ 無料配布版</div>

    </div>
  </div>
</div></div>`;
}

function blankCell() {
  return `<div class="card-cell">
  <div class="cm cm-tl"></div><div class="cm cm-tr"></div>
  <div class="cm cm-bl"></div><div class="cm cm-br"></div>
  <div class="card-blank"></div>
</div>`;
}

// ============================================================
//  表面と同じ枚数のページを生成
//  ページ数: 攻撃12枚, 防御13枚, フィールド15枚, 状態10枚 = 50枚 → 6ページ
// ============================================================
const TOTAL_CARDS = 50;  // 表面の総カード数（空白含まず）
const PER_PAGE = 9;
const TOTAL_PAGES = Math.ceil(TOTAL_CARDS / PER_PAGE);  // = 6

document.addEventListener('DOMContentLoaded', () => {
  const out = document.getElementById('output');
  let html = '';

  for (let p = 0; p < TOTAL_PAGES; p++) {
    const cardsOnPage = Math.min(PER_PAGE, TOTAL_CARDS - p * PER_PAGE);
    let pageHtml = '';
    for (let i = 0; i < PER_PAGE; i++) {
      if (i < cardsOnPage) {
        pageHtml += makeBackCard();
      } else {
        pageHtml += blankCell();
      }
    }
    html += `<div class="page-label">裏面 ${p+1}/${TOTAL_PAGES}ページ（印刷時非表示）</div>
             <div class="page">${pageHtml}</div>`;
  }

  out.innerHTML = html;
});
</script>
</body>
</html>
